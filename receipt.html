<!-- -------------------------------------------------------------------
 * File: receipt.html
 * Description: Dedicated page for viewing and printing a violation receipt
 * accessible by both public users and authenticated staff.
 * This new file resolves the issue of receipts failing to load in the public portal.
 * ------------------------------------------------------------------- -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Violation Receipt</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Specific Receipt Page Styles */
        #receipt-header {
            margin-bottom: 30px;
            text-align: center;
        }
        #receipt-header h1 {
            color: var(--color-success);
            font-size: 2rem;
            margin-bottom: 10px;
        }
        #receipt-output {
            /* Mimics a physical receipt/document */
            padding: 0;
            background-color: white;
            border: 1px solid #ddd;
            min-height: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        /* Styles to make the print button look good on the view page */
        .receipt-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        /* Utility styles inherited from script.js generateReceiptHTML for consistency */
        .receipt-box {
             padding: 30px;
        }
    </style>
</head>
<body onload="setupReceiptPage()">

    <div id="toast-container"></div>
    <header class="header">
        <nav class="nav">
            <div class="nav-title" style="display: flex; align-items: center; gap: 15px;">
                <img src="logo.png" alt="Railway Logo" id="portal-logo" style="height: 40px; width: auto;">
                <a href="index.html">V-MAP: Fine Payment Receipt Portal</a>
            </div>
            <div class="nav-links">
                <button id="return-btn" class="btn btn-secondary">← Return to Home</button>
            </div>
        </nav>
    </header>

    <div class="container animate-fade-in-up">
        
        <div id="receipt-header">
            <h1>Transaction Complete</h1>
            <p style="color: var(--color-text-light);">View, download, or print your official violation receipt below.</p>
        </div>

        <div class="receipt-actions">
            <button id="print-receipt-btn" class="btn btn-info">🖨️ Print/Save Receipt (PDF)</button>
        </div>

        <div id="receipt-output" class="card">
            <div class="empty-state">Loading receipt details...</div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
